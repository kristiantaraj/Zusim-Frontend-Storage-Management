name: Deploy Frontend To Oracle

on:
  push:
    branches:
      - master
    paths:
      - frontend/**
      - .github/workflows/deploy-oracle-frontend.yml
  workflow_dispatch:

concurrency:
  group: oracle-frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_PORT || '22' }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/app
            git fetch origin
            git pull --ff-only origin master

            cd ~/app/frontend
            cat <<'ENVEOF' > .env.production
            VITE_API_BASE_URL=/api
            VITE_MANAGER_PASSWORD=${{ secrets.VITE_MANAGER_PASSWORD }}
            ENVEOF
            npm ci
            npm run build

            sudo mkdir -p /var/www/zusim
            sudo rm -rf /var/www/zusim/*
            sudo cp -r dist/* /var/www/zusim/

            sudo nginx -t
            sudo systemctl reload nginx

            echo "Deployment completed at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
